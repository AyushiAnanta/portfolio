<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Window Background -->
  <rect width="120" height="120" rx="24" fill="#0f172a" />
  
  <!-- Top Bar -->
  <rect width="120" height="36" rx="24" fill="#1e293b" />
  <rect width="120" height="18" y="18" fill="#1e293b" />
  
  <!-- Mac Buttons -->
  <circle cx="26" cy="18" r="7" fill="#ff5f56" />
  <circle cx="50" cy="18" r="7" fill="#ffbd2e" />
  <circle cx="74" cy="18" r="7" fill="#27c93f" />

  <!-- Blue > prompt -->
  <text x="24" y="96" font-family="'Courier New', Courier, monospace" font-size="72" font-weight="900" fill="#3b82f6">&gt;</text>
  
  <!-- Purple Cursor Block -->
  <rect x="70" y="52" width="24" height="46" fill="#a78bfa" />
</svg>